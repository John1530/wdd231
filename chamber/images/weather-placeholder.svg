<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">

    <title id="title">Weather Icon</title>
    <desc id="desc">Sun behind a cloud</desc>

    <!-- Sun -->
    <circle cx="42" cy="42" r="20" fill="#F6C453"></circle>

    <!-- Sun rays -->
    <g stroke="#F6C453" stroke-width="5" stroke-linecap="round">

        <line x1="42" y1="8" x2="42" y2="18"></line>
        <line x1="42" y1="66" x2="42" y2="76"></line>
        <line x1="8" y1="42" x2="18" y2="42"></line>
        <line x1="66" y1="42" x2="76" y2="42"></line>

        <line x1="18" y1="18" x2="25" y2="25"></line>
        <line x1="59" y1="59" x2="66" y2="66"></line>
        <line x1="18" y1="66" x2="25" y2="59"></line>
        <line x1="59" y1="25" x2="66" y2="18"></line>
    </g>

    <!-- Cloud -->
    <path d="
            M38 92
            H93
            C108 92 118 83 118 70
            C118 58 108 49 95 48
            C91 34 79 25 64 25
            C47 25 34 37 31 53
            C17 54 8 63 8 74
            C8 85 18 92 38 92
